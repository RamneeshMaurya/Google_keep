apiVersion: apps/v1
kind: Deployment
metadata:
  name: google-keep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: google-keep
  template:
    metadata:
      labels:
        app: google-keep
    spec:
      containers:
      - name: google-keep
        image: ramneeshmaurya/google-keep-app:v1
        ports:
        - containerPort: 3000